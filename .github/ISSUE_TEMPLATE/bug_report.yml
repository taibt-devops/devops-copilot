name: Bug report
description: Report a problem with DevOps Copilot
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please **do not include any secrets,
        tokens, internal hostnames, or production data** in this report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I ask "...", the agent returns ... but I expected ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure with ...
        2. Ask "..."
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Paste any relevant log output (redact secrets and sensitive data).
      render: shell
  - type: input
    id: version
    attributes:
      label: Environment
      placeholder: Node 22, local dev / Docker, Claude Opus 4.x
    validations:
      required: true
