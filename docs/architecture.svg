<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" font-family="'Segoe UI',Inter,-apple-system,Roboto,sans-serif">
  <defs>
    <linearGradient id="copilot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1f2b"/><stop offset="1" stop-color="#141823"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="1280" height="760" fill="#0a0c10"/>

  <!-- Header -->
  <text x="60" y="46" fill="#e7eaf0" font-size="27" font-weight="700">DevOps Copilot</text>
  <text x="60" y="72" fill="#8b93a4" font-size="15">A read-only AI incident copilot the whole team can ask — it reads &amp; diagnoses everything, changes nothing.</text>

  <!-- A) Users -->
  <g>
    <rect x="150" y="100" width="160" height="42" rx="21" fill="#141823" stroke="#222936"/>
    <text x="230" y="126" fill="#e7eaf0" font-size="15" text-anchor="middle">👩‍💻 Dev team</text>
    <rect x="345" y="100" width="160" height="42" rx="21" fill="#141823" stroke="#222936"/>
    <text x="425" y="126" fill="#e7eaf0" font-size="15" text-anchor="middle">🧪 QC team</text>
    <rect x="540" y="100" width="180" height="42" rx="21" fill="#141823" stroke="#222936"/>
    <text x="630" y="126" fill="#e7eaf0" font-size="15" text-anchor="middle">🎮 Game / UE team</text>

    <rect x="225" y="158" width="430" height="40" rx="12" fill="#0d1016" stroke="#2a3550"/>
    <text x="440" y="183" fill="#818cf8" font-size="15" text-anchor="middle" font-style="italic">"why is checkout-api returning 401 in prod?"  📱</text>
  </g>
  <line x1="440" y1="198" x2="440" y2="222" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- B) Copilot core -->
  <rect x="70" y="226" width="800" height="262" rx="16" fill="url(#copilot)" stroke="#2e3650"/>
  <text x="96" y="262" fill="#818cf8" font-size="21" font-weight="700">DEVOPS COPILOT</text>
  <text x="96" y="285" fill="#8b93a4" font-size="13.5">Built on the Claude Agent SDK · talks to your tools through MCP</text>

  <!-- read-only badge -->
  <rect x="565" y="240" width="285" height="38" rx="19" fill="rgba(63,185,80,.12)" stroke="#3fb950"/>
  <text x="707" y="265" fill="#3fb950" font-size="14.5" font-weight="600" text-anchor="middle">🔒 READ-ONLY · enforced in code</text>

  <!-- agent loop -->
  <rect x="96" y="304" width="748" height="40" rx="10" fill="#0d1016" stroke="#222936"/>
  <text x="470" y="329" fill="#e7eaf0" font-size="14.5" text-anchor="middle">Agent loop:  investigate  →  correlate logs · traces · deploys · tickets  →  cite</text>

  <!-- 3-layer gate -->
  <text x="96" y="372" fill="#8b93a4" font-size="12.5" font-weight="600">3 INDEPENDENT LAYERS BLOCK ANY MUTATION</text>
  <g font-size="12.5">
    <rect x="96" y="382" width="240" height="84" rx="10" fill="#0d1016" stroke="#2a3550"/>
    <text x="112" y="406" fill="#e7eaf0" font-weight="600">Layer 1 · tool gate</text>
    <text x="112" y="427" fill="#8b93a4">classify the verb;</text>
    <text x="112" y="445" fill="#8b93a4">deny every write</text>
    <text x="112" y="463" fill="#8b93a4">(create/delete/…)</text>

    <rect x="350" y="382" width="240" height="84" rx="10" fill="#0d1016" stroke="#2a3550"/>
    <text x="366" y="406" fill="#e7eaf0" font-weight="600">Layer 2 · hard deny</text>
    <text x="366" y="427" fill="#8b93a4">no shell, no file</text>
    <text x="366" y="445" fill="#8b93a4">write, no arbitrary</text>
    <text x="366" y="463" fill="#8b93a4">fetch</text>

    <rect x="604" y="382" width="240" height="84" rx="10" fill="#0d1016" stroke="#2a3550"/>
    <text x="620" y="406" fill="#e7eaf0" font-weight="600">Layer 3 · creds</text>
    <text x="620" y="427" fill="#8b93a4">read-only IAM (IRSA),</text>
    <text x="620" y="445" fill="#8b93a4">read-only MCP users,</text>
    <text x="620" y="463" fill="#8b93a4">EKS get/list/watch</text>
  </g>

  <line x1="470" y1="488" x2="470" y2="512" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- C) Existing stack -->
  <rect x="70" y="516" width="800" height="118" rx="16" fill="#0d1016" stroke="#222936"/>
  <text x="96" y="544" fill="#8b93a4" font-size="13" font-weight="600">YOUR EXISTING STACK — queried READ-ONLY via MCP (no new agents, no migration)</text>
  <g font-size="13.5" text-anchor="middle">
    <rect x="96" y="558" width="138" height="54" rx="10" fill="#141823" stroke="#2a3550"/>
    <text x="165" y="590" fill="#e7eaf0">Grafana</text>
    <rect x="246" y="558" width="138" height="54" rx="10" fill="#141823" stroke="#2a3550"/>
    <text x="315" y="590" fill="#e7eaf0">OpenSearch</text>
    <rect x="396" y="558" width="138" height="54" rx="10" fill="#141823" stroke="#2a3550"/>
    <text x="465" y="590" fill="#e7eaf0">Jenkins</text>
    <rect x="546" y="558" width="138" height="54" rx="10" fill="#141823" stroke="#2a3550"/>
    <text x="615" y="590" fill="#e7eaf0">Kubernetes</text>
    <rect x="696" y="558" width="150" height="54" rx="10" fill="#141823" stroke="#2a3550"/>
    <text x="771" y="584" fill="#e7eaf0">AWS</text>
    <text x="771" y="601" fill="#8b93a4" font-size="11">EC2·SSM·Bedrock·S3</text>
  </g>

  <!-- Right: knowledge sidebar -->
  <rect x="896" y="226" width="318" height="408" rx="16" fill="#0d1016" stroke="#222936"/>
  <text x="920" y="258" fill="#8b93a4" font-size="13" font-weight="600">KNOWLEDGE THAT COMPOUNDS</text>
  <g font-size="13.5">
    <rect x="916" y="274" width="278" height="68" rx="10" fill="#141823" stroke="#2a3550"/>
    <text x="934" y="300" fill="#e7eaf0" font-weight="600">knowledge/</text>
    <text x="934" y="322" fill="#8b93a4">always-on map of your infra</text>

    <rect x="916" y="354" width="278" height="68" rx="10" fill="#141823" stroke="#2a3550"/>
    <text x="934" y="380" fill="#e7eaf0" font-weight="600">skills</text>
    <text x="934" y="402" fill="#8b93a4">runbooks fetched on demand</text>

    <rect x="916" y="434" width="278" height="68" rx="10" fill="#141823" stroke="#2a3550"/>
    <text x="934" y="460" fill="#e7eaf0" font-weight="600">memory + history</text>
    <text x="934" y="482" fill="#8b93a4">learns from past incidents</text>

    <rect x="916" y="514" width="278" height="98" rx="10" fill="#141823" stroke="#2a3550"/>
    <text x="934" y="540" fill="#e7eaf0" font-weight="600">RAG  <tspan fill="#3fb950" font-size="11">opt-in</tspan></text>
    <text x="934" y="562" fill="#8b93a4">semantic search over your docs</text>
    <text x="934" y="582" fill="#8b93a4">Bedrock embeddings →</text>
    <text x="934" y="600" fill="#8b93a4">Amazon S3 Vectors</text>
  </g>

  <!-- Bottom: answer -->
  <rect x="70" y="660" width="1144" height="54" rx="12" fill="rgba(99,102,241,.10)" stroke="#3a4366"/>
  <text x="92" y="685" fill="#e7eaf0" font-size="14"><tspan fill="#818cf8">↩  Answer</tspan>  with cited evidence + confidence  <tspan fill="#3fb950">[OBS]</tspan> observed · <tspan fill="#818cf8">[CANDIDATE]</tspan> likely · <tspan fill="#8b93a4">[?]</tspan> unverified</text>
  <text x="92" y="704" fill="#8b93a4" font-size="13">If a fix is needed, it <tspan fill="#e7eaf0">describes</tspan> the exact change for a human to run — it never executes it.</text>

  <text x="1214" y="744" fill="#5b6472" font-size="12.5" text-anchor="end">github.com/taibt-devops/devops-copilot</text>
</svg>
