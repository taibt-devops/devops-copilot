apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-copilot
  namespace: devops-copilot
  annotations:
    # IRSA: bind to a READ-ONLY IAM role (EC2 describe-*, SSM get-*, etc.).
    # Create the role with a trust policy for this SA, then put its ARN here.
    eks.amazonaws.com/role-arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/<devops-copilot-readonly-role>
